services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - artifact-storage:/var/www/html/storage/app/artifacts
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_DATABASE=aimodel
      - DB_USERNAME=aimodel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: php artisan queue:work redis --queue=workflow-runs --timeout=900 --tries=1 --sleep=3
    volumes:
      - .:/var/www/html
      - artifact-storage:/var/www/html/storage/app/artifacts
    depends_on:
      - postgres
      - redis
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_DATABASE=aimodel
      - DB_USERNAME=aimodel
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=aimodel
      - POSTGRES_USER=aimodel
      - POSTGRES_PASSWORD=secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6279:6379"

volumes:
  pgdata:
  artifact-storage:
