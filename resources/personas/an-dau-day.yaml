    - "Quán hẻm Sài Gòn"
    - "Đặc sản vùng miền"
    - "Food map"
  formats:
    - "Review nhanh 30s (1 món = 1 video)"
    - "Food tour khu vực (3-5 quán/video)"
    - "Đặc sản tỉnh (series theo vùng)"
    - "So sánh: cùng 1 món ở 3 mức giá"
  platforms:
    - platform: "TikTok"
      priority: "primary"
    - platform: "YouTube Shorts"
      priority: "primary"
    - platform: "Facebook Reels"
      priority: "primary"  # FB strong for VN food content
  posting_frequency: "5x/tuần TikTok, 3x/tuần YT Shorts, 3x/tuần FB"

brand:
  partnerships_open_to:
    - "Quán ăn local"
    - "Food delivery app"
    - "Gia vị/nước chấm Việt"
  partnerships_avoid:
    - "Fast food chains nước ngoài"
    - "Thực phẩm chức năng"
  ethical_boundaries:
